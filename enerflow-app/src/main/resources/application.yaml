spring:
  application:
    name: enerflow-app
  datasource:
    url: jdbc:postgresql://localhost:5432/enerflow
    username: enerflow
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

# Heat pump connection settings
heatpump:
  host: 192.168.178.138
  port: 8214
  password: ${HEATPUMP_PASSWORD}
  reconnect-delay-seconds: 30
  polling-interval-ms: 60000

logging:
  level:
    de.saki.enerflow: DEBUG
    org.java_websocket: DEBUG

# sonnenBatterie local REST API settings
sonnen:
  host: ${SONNEN_HOST}
  api-token: ${SONNEN_API_TOKEN}